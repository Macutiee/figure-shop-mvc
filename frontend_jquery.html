<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Cửa Hàng Waifu - Quản Trị API</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body class="bg-light p-4">

<div class="container bg-white p-4 rounded shadow-sm" style="max-width: 900px;">
    <h2 class="text-pink text-center mb-4" style="color: #ff66b2;">🌸 Quản Trị Waifu Bằng API & jQuery 🌸</h2>
    
    <div class="card mb-4 border-pink">
        <div class="card-header bg-pink text-white" style="background-color: #ffb3d9;">1. Đăng Nhập Lấy Cấp Phép</div>
        <div class="card-body">
            <button id="btnLogin" class="btn btn-primary">Lấy Token (Chìa Khóa)</button>
            <span id="tokenStatus" class="ms-3 fw-bold text-success"></span>
        </div>
    </div>

    <div class="card mb-4 border-success">
        <div class="card-header bg-success text-white">2. Thêm Waifu Mới (POST)</div>
        <div class="card-body row g-3">
            <div class="col-md-4"><input type="text" id="addName" class="form-control" placeholder="Tên Waifu..."></div>
            <div class="col-md-3"><input type="number" id="addPrice" class="form-control" placeholder="Giá (VNĐ)"></div>
            <div class="col-md-3">
                <select id="addBrand" class="form-select">
                    <option value="">Chọn Hãng...</option>
                </select>
            </div>
            <div class="col-md-2">
                <button id="btnCreate" class="btn btn-success w-100">Thêm!</button>
            </div>
        </div>
    </div>

    <div class="card mb-4 border-danger">
        <div class="card-header bg-danger text-white">3. Kho Hàng Waifu (GET & DELETE)</div>
        <div class="card-body">
            <button id="btnLoadProducts" class="btn btn-danger mb-3">Tải Danh Sách Mới Nhất</button>
            <ul id="productList" class="list-group"></ul>
        </div>
    </div>
</div>

<script>
    const BASE_URL = "http://localhost:8080/figure-shop-mvc/index.php?action=";
    let myToken = ""; 

    $(document).ready(function() {
        
        // 1. LOGIN
        $("#btnLogin").click(function() {
            $.ajax({
                url: BASE_URL + "api_login", type: "POST", contentType: "application/json",
                data: JSON.stringify({ email: "baoloann2811@gmail.com", password: "123456" }), 
                success: function(res) {
                    myToken = res.token; 
                    $("#tokenStatus").text("✅ Đã có Token!");
                    loadCategories(); // Có token xong gọi luôn API Hãng để xổ xuống
                },
                error: function() { alert("Sai tài khoản!"); }
            });
        });

        // 2. TẢI DANH MỤC HÃNG (Gọi API Category)
        function loadCategories() {
            $.ajax({
                url: BASE_URL + "api_categories", type: "GET",
                headers: { "Authorization": "Bearer " + myToken },
                success: function(brands) {
                    $("#addBrand").empty().append('<option value="">Chọn Hãng...</option>');
                    $.each(brands, function(i, b) {
                        $("#addBrand").append(`<option value="${b.name}">${b.name}</option>`);
                    });
                }
            });
        }

        // 3. TẢI DANH SÁCH WAIFU (Vẽ giao diện có nút Xóa)
        $("#btnLoadProducts").click(function() {
            if(!myToken) { alert("Chưa có Token!"); return; }
            $.ajax({
                url: BASE_URL + "api_products", type: "GET",
                headers: { "Authorization": "Bearer " + myToken },
                success: function(products) {
                    $("#productList").empty(); 
                    $.each(products, function(i, p) {
                        let li = `
                            <li class="list-group-item d-flex justify-content-between align-items-center">
                                <div><b>${p.name}</b> <br><small>${p.brand} | Tồn: ${p.stock}</small></div>
                                <div>
                                    <span class="badge bg-primary rounded-pill me-3">${Number(p.price).toLocaleString()} đ</span>
                                    <button class="btn btn-sm btn-outline-danger btn-delete" data-id="${p.id}">Xóa</button>
                                </div>
                            </li>`;
                        $("#productList").append(li);
                    });
                }
            });
        });

        // 4. THÊM SẢN PHẨM (POST)
        $("#btnCreate").click(function() {
            if(!myToken) { alert("Chưa có Token!"); return; }
            let dataGuiLen = {
                name: $("#addName").val(),
                price: $("#addPrice").val(),
                brand: $("#addBrand").val(),
                stock: 10
            };
            $.ajax({
                url: BASE_URL + "api_create", type: "POST", contentType: "application/json",
                headers: { "Authorization": "Bearer " + myToken },
                data: JSON.stringify(dataGuiLen),
                success: function(res) {
                    alert("Thêm thành công!");
                    $("#btnLoadProducts").click(); // Click lại nút tải để load lại danh sách mới
                }
            });
        });

        // 5. XÓA SẢN PHẨM (DELETE)
        // Vì nút Xóa được sinh ra sau nên phải dùng $(document).on
        $(document).on('click', '.btn-delete', function() {
            let idCanXoa = $(this).data('id');
            if(confirm("Sếp chắc chắn muốn tiễn bé này đi?")) {
                $.ajax({
                    url: BASE_URL + "api_delete", type: "DELETE", contentType: "application/json",
                    headers: { "Authorization": "Bearer " + myToken },
                    data: JSON.stringify({ id: idCanXoa }),
                    success: function(res) {
                        alert("Đã xóa xong!");
                        $("#btnLoadProducts").click(); // Tải lại danh sách
                    }
                });
            }
        });

    });
</script>

</body>
</html>
